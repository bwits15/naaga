{% extends "base.html" %}
{% block content %}

<section class="page-head">
  <h1>캘린더</h1>
  <p class="sub">NAAGA 일정 — 월별로 한눈에 확인하세요.</p>
</section>

<section class="card calendar-wrap">
  <div class="cal-top">
    <button class="cal-btn" id="prevBtn" type="button">←</button>
    <div class="cal-title" id="monthTitle">----</div>
    <button class="cal-btn" id="nextBtn" type="button">→</button>
  </div>

  <div class="cal-grid cal-week">
    <div>Sun</div>
    <div>Mon</div>
    <div>Tue</div>
    <div>Wed</div>
    <div>Thu</div>
    <div>Fri</div>
    <div>Sat</div>
  </div>

  <div class="cal-grid" id="calendarGrid"></div>

  <div class="calendar-detail" id="calendarDetail">
    <div class="detail-title">날짜를 선택하세요</div>
    <div class="detail-events">
      <div class="detail-empty">날짜를 누르면 일정이 여기에 보여요.</div>
    </div>
  </div>
</section>

<script>
  let EVENTS = {};

  let current = new Date();
  current.setDate(1);

  const monthTitle = document.getElementById("monthTitle");
  const grid = document.getElementById("calendarGrid");
  const detailBox = document.getElementById("calendarDetail");
  const detailTitle = detailBox.querySelector(".detail-title");
  const detailEvents = detailBox.querySelector(".detail-events");

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function renderDetail(key, list) {
    detailTitle.textContent = `${key} 일정`;
    detailEvents.innerHTML = "";

    if (!list || list.length === 0) {
      detailEvents.innerHTML = "<div class='detail-empty'>일정 없음</div>";
      return;
    }

    list.forEach((item) => {
      const row = document.createElement("div");
      row.className = "detail-item";
      row.textContent = item;
      detailEvents.appendChild(row);
    });
  }

  function render() {
    const y = current.getFullYear();
    const m = current.getMonth();
    monthTitle.textContent = `${y}.${pad(m + 1)}`;

    grid.innerHTML = "";

    const firstDay = new Date(y, m, 1);
    const startWeekday = firstDay.getDay();
    const lastDate = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < startWeekday; i++) {
      const empty = document.createElement("div");
      empty.className = "cal-cell cal-empty";
      grid.appendChild(empty);
    }

    for (let d = 1; d <= lastDate; d++) {
      const key = `${y}-${pad(m + 1)}-${pad(d)}`;
      const cell = document.createElement("div");
      cell.className = "cal-cell";

      const dateEl = document.createElement("div");
      dateEl.className = "cal-date";
      dateEl.textContent = d;

      const today = new Date();
      if (
        y === today.getFullYear() &&
        m === today.getMonth() &&
        d === today.getDate()
      ) {
        const todayTag = document.createElement("span");
        todayTag.className = "cal-today-tag";
        todayTag.textContent = "today";
        dateEl.appendChild(todayTag);
      }

      cell.appendChild(dateEl);

      if (EVENTS[key]) {
        cell.classList.add("cal-has");

        const eventsWrap = document.createElement("div");
        eventsWrap.className = "cal-events-inline";

        EVENTS[key].forEach((item, index) => {
          if (index < 2) {
            const eventEl = document.createElement("div");
            eventEl.className = "cal-event-item";

            const shortLabel =
              window.innerWidth <= 768
                ? (item.length > 6 ? item.slice(0, 6) + "…" : item)
                : item;

            eventEl.textContent = shortLabel;
            eventsWrap.appendChild(eventEl);
          }
        });

        if (EVENTS[key].length > 2) {
          const moreEl = document.createElement("div");
          moreEl.className = "cal-event-more";
          moreEl.textContent = `+${EVENTS[key].length - 2}`;
          eventsWrap.appendChild(moreEl);
        }

        cell.appendChild(eventsWrap);
      }

      cell.addEventListener("click", () => {
        renderDetail(key, EVENTS[key] || []);
      });

      grid.appendChild(cell);
    }
  }

  document.getElementById("prevBtn").addEventListener("click", () => {
    current.setMonth(current.getMonth() - 1);
    render();
  });

  document.getElementById("nextBtn").addEventListener("click", () => {
    current.setMonth(current.getMonth() + 1);
    render();
  });

  fetch("/static/events.json")
    .then((res) => res.json())
    .then((data) => {
      EVENTS = data || {};
      render();
    })
    .catch(() => {
      EVENTS = {};
      render();
    });
</script>

{% endblock %}
